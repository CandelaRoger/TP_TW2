<div class="tienda-container">
  
  <header class="header-electronico">
    <div class="logo-container">
    
    </div>
   <div class="header-actions" style="display: flex; gap: 10px;"> 

   </div>
  </header>


  <main class="contenido">
    <h2 class="titulo-seccion">Catálogo</h2>

    @if (cargando) {
      <div class="spinner-container">
        <img src="pokeballl.png" class="spinner-pokeball" alt="Cargando..." />
        <p class="spinner-texto">Cargando productos...</p>
      </div>
    } @else {
      <div class="productos-grid">
        @for (producto of listaProductos; track producto.Id) {
          <app-pokemon 
            [datos]="producto"
            [cantidad]="obtenerCantidad(producto)"
            (onIncrementar)="incrementarCantidad($event)"
            (onDecrementar)="decrementarCantidad($event)"
            (onAgregar)="agregarProducto($event)">
          </app-pokemon>
        } @empty {
          <p class="vacio-mensaje">Buscando productos en el almacén...</p>
        }
      </div>
    }

  </main>

</div>
